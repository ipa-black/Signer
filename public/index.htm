<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA BLACK | التوقيع السحابي المتميز</title>
    <!-- استدعاء خط Cairo الأنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الحماية الأساسية ومنع النسخ والتقريب */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%); /* خلفية أعماق البحر المظلمة */
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        
        /* تأثير النجوم الخافتة في الخلفية */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #e0e0e0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #cccccc, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            z-index: -1;
            opacity: 0.4;
        }

        /* واجهة الزجاج (Apple Glassmorphism) */
        .container {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px 30px;
            width: 92%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h1 { font-weight: 800; font-size: 32px; margin-bottom: 5px; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        h1 span { color: #007AFF; } /* الأزرق الخاص بـ Apple */
        p.subtitle { font-size: 14px; color: #a1a1a6; margin-bottom: 35px; }

        /* تصميم الحقول والقوائم */
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 8px; color: #d2d2d7; font-weight: 600; }
        
        input[type="file"], input[type="text"], select {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="file"]::file-selector-button {
            background: #2c2c2e; color: #fff; border: none; padding: 8px 16px; border-radius: 10px; margin-left: 10px; cursor: pointer; font-family: 'Cairo'; transition: 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background: #3a3a3c; }
        input:focus, select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.25); }

        /* زر التوقيع */
        button {
            width: 100%;
            background: #007AFF;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }
        button:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2); }
        button:disabled { background: #3a3a3c; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        /* شريط التحميل الانسيابي */
        .progress-container { display: none; margin-top: 25px; }
        .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: #007AFF; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(0,122,255,0.6); }
        .status-text { margin-top: 12px; font-size: 13px; color: #a1a1a6; font-weight: 600; transition: color 0.3s ease; }
    </style>
</head>
<body>

<!-- خلفية النجوم -->
<div class="stars"></div>

<div class="container">
    <h1>IPA <span>BLACK</span></h1>
    <p class="subtitle">محرك التوقيع السحابي فائق السرعة</p>

    <div class="input-group">
        <label>التطبيق المراد توقيعه</label>
        <select id="appSelect">
            <option value="ESign">ESign (النسخة الرسمية)</option>
            <option value="KSign">KSign (النسخة الرسمية)</option>
            <option value="Feather">Feather</option>
            <option value="Scarlet">Scarlet</option>
            <option value="GBox">GBox</option>
        </select>
    </div>

    <div class="input-group">
        <label>شهادة التوقيع (.p12)</label>
        <input type="file" id="p12File" accept=".p12" required>
    </div>

    <div class="input-group">
        <label>ملف التكوين (.mobileprovision)</label>
        <input type="file" id="provFile" accept=".mobileprovision" required>
    </div>

    <div class="input-group">
        <label>كلمة مرور الشهادة</label>
        <input type="text" id="certPassword" placeholder="اكتب كلمة المرور هنا" required autocomplete="off">
    </div>

    <button id="signBtn" onclick="startSigning()">بدء التوقيع الآن</button>

    <div class="progress-container" id="progressWrapper">
        <div class="progress-bg">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="status-text" id="statusText">جاري تهيئة المحرك...</p>
    </div>
</div>

<script>
    // الحماية الصارمة من النسخ، الفحص، والاختصارات
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', event => {
        if (event.ctrlKey && (event.key === 'c' || event.key === 'v' || event.key === 'u' || event.key === 's' || event.key === 'p')) {
            event.preventDefault();
        }
    });

    // دالة تحويل الملفات إلى Base64 استعداداً لإرسالها لـ API
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });

    async function startSigning() {
        const appSelect = document.getElementById('appSelect').value;
        const p12File = document.getElementById('p12File').files[0];
        const provFile = document.getElementById('provFile').files[0];
        const certPassword = document.getElementById('certPassword').value;

        if (!p12File || !provFile || !certPassword) {
            alert("⚠️ يرجى إرفاق الشهادة وملف التكوين وكلمة المرور للبدء!");
            return;
        }

        const signBtn = document.getElementById('signBtn');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');

        signBtn.disabled = true;
        progressWrapper.style.display = 'block';

        try {
            // الخطوة 1: تشفير الشهادات
            statusText.innerText = "جاري تشفير الشهادات ومعالجة البيانات...";
            progressBar.style.width = '15%';
            
            const p12Base64 = await toBase64(p12File);
            const provBase64 = await toBase64(provFile);

            progressBar.style.width = '35%';
            statusText.innerText = "جاري الاتصال بمحرك التوقيع السحابي...";

            // الخطوة 2: إرسال الطلب لـ API (يجب أن يكون لديك ملف api/sign.js جاهز)
            const response = await fetch('/api/sign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    app_name: appSelect,
                    password: certPassword,
                    p12_base64: p12Base64,
                    prov_base64: provBase64
                })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.message || "حدث خطأ في استجابة الخادم");
            }

            // الخطوة 3: التوقيع جاري الآن على خوادم جيت هاب
            progressBar.style.width = '70%';
            statusText.innerText = "جاري التوقيع وزرع الأيقونات (الرجاء عدم إغلاق الصفحة)...";

            // تفعيل العداد الذكي المتزامن مع المحرك "التوربو" (25 ثانية)
            startSmartProgress();

        } catch (error) {
            progressBar.style.background = '#ff453a'; // أحمر للخطأ
            statusText.style.color = '#ff453a';
            statusText.innerText = "❌ فشل التوقيع: " + error.message;
            signBtn.disabled = false;
        }
    }

    // شريط التحميل الذكي (يحاكي وقت التوقيع الفعلي في GitHub Actions)
    function startSmartProgress() {
        let progress = 70;
        const interval = setInterval(() => {
            progress += 1;
            if (progress <= 96) {
                document.getElementById('progressBar').style.width = progress + '%';
            }
        }, 800); // زيادة بطيئة ومنتظمة

        // بعد مرور 25 ثانية (وقت اكتمال المحرك السريع)، يكتمل الشريط
        setTimeout(() => {
            clearInterval(interval);
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            
            progressBar.style.width = '100%';
            progressBar.style.background = '#32d74b'; // أخضر للنجاح
            statusText.style.color = '#32d74b';
            statusText.innerText = "✅ تم التوقيع بنجاح! جاري التجهيز للتثبيت...";
            
            // في الخطوة القادمة سيتم برمجة التوجيه التلقائي لرابط التحميل
            // setTimeout(() => window.location.href = result.downloadUrl, 2000);
            
        }, 25000);
    }
</script>
</body>
</html>
