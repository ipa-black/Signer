name: Premium Cloud Signer Engine

on:
  repository_dispatch:
    types: [trigger-sign]

jobs:
  build_and_sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          show-progress: false # إخفاء شريط التحميل لتوفير الوقت

      - name: 🚀 Hyper Speed Sign (RAM Disk & Surgical Inject)
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          USE_FREE_CERT: ${{ github.event.client_payload.use_free_cert }}
          P12_BASE64: ${{ github.event.client_payload.p12_base64 }}
          PROV_BASE64: ${{ github.event.client_payload.prov_base64 }}
          CUSTOM_PASSWORD: ${{ github.event.client_payload.password }}
          BUILD_ID: ${{ github.event.client_payload.build_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # 1. الانتقال فوراً إلى ذاكرة الـ RAM (أسرع 100 مرة من القرص الصلب)
          mkdir -p /dev/shm/workspace
          cd /dev/shm/workspace
          
          # 2. تحميل كل شيء في نفس اللحظة بالخلفية
          wget -qO- https://github.com/zhlynn/zsign/releases/download/v1.0.4/zsign-linux-x86_64.tar.gz | tar -xz &
          PID_ZSIGN=$!

          IPA_URL=""
          ICON_URL=""

          if [[ "$APP_NAME" == "ESign" ]]; then IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Esign.ipa"; ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1419.jpeg";
          elif [[ "$APP_NAME" == "KSign" ]]; then IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Ksign.7.ipa"; ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1416.jpeg";
          elif [[ "$APP_NAME" == "Feather" ]]; then IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Feather.ipa"; ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1421.jpeg";
          elif [[ "$APP_NAME" == "Scarlet" ]]; then IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Scarlet.ipa"; ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1420.jpeg";
          elif [[ "$APP_NAME" == "GBox" ]]; then IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/GBox_v5.7.6.ipa"; ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1417.jpeg"; fi

          curl -sL --fail -o raw_app.ipa "$IPA_URL" & PID_IPA=$!
          curl -sL --fail -o downloaded_icon.png "$ICON_URL" & PID_ICON=$!

          # 3. سحب الشهادات من مسارها الحقيقي أثناء وقت التحميل
          if [[ "$USE_FREE_CERT" == "true" ]]; then
            cp $GITHUB_WORKSPACE/cert/cert.p12 ./cert.p12
            cp $GITHUB_WORKSPACE/cert/profile.mobileprovision ./profile.mobileprovision
            CERT_PASSWORD=$(cat $GITHUB_WORKSPACE/cert/pass.txt)
          else
            echo "$P12_BASE64" | base64 -d > cert.p12
            echo "$PROV_BASE64" | base64 -d > profile.mobileprovision
            CERT_PASSWORD="$CUSTOM_PASSWORD"
          fi

          # انتظار انتهاء التحميلات (يستغرق ثانية إلى ثانيتين)
          wait $PID_ZSIGN
          wait $PID_IPA
          wait $PID_ICON

          chmod +x zsign

          # 4. الحقن الجراحي (بدون فك ضغط التطبيق بالكامل = صفر ثانية!)
          # العثور على مسار مجلد التطبيق داخل הـ IPA
          APP_DIR=$(unzip -Z1 raw_app.ipa | grep -o '^Payload/[^/]*.app/' | head -n 1)
          
          # استخراج ملف Info.plist فقط!
          unzip -qq raw_app.ipa "${APP_DIR}Info.plist"
          
          # نقل الأيقونة للمسار الصحيح
          mv downloaded_icon.png "${APP_DIR}CustomIpaBlackIcon.png"

          python3 -c '
          import plistlib, glob, os
          app_name = os.environ.get("APP_NAME", "unknown")
          app_dirs = glob.glob("Payload/*.app")
          if app_dirs:
              app_dir = app_dirs[0]
              plist_path = os.path.join(app_dir, "Info.plist")
              try:
                  with open(plist_path, "rb") as f: pl = plistlib.load(f)
                  bundle_id = pl.get("CFBundleIdentifier", f"com.ipablack.{app_name}")
                  print(bundle_id)
                  pl["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["CustomIpaBlackIcon"], "UIPrerenderedIcon": True}}
                  if "CFBundleIcons~ipad" in pl: pl["CFBundleIcons~ipad"] = pl["CFBundleIcons"]
                  with open(plist_path, "wb") as f: plistlib.dump(pl, f)
              except:
                  print(f"com.ipablack.{app_name}")
          else:
              print(f"com.ipablack.{app_name}")
          ' > bundle_id.txt

          if [[ "$APP_NAME" == "Feather" || "$APP_NAME" == "KSign" ]]; then
            mkdir -p "${APP_DIR}signing-assets/PremiumCert"
            cp cert.p12 "${APP_DIR}signing-assets/PremiumCert/cert.p12"
            cp profile.mobileprovision "${APP_DIR}signing-assets/PremiumCert/cert.mobileprovision"
            echo "$CERT_PASSWORD" > "${APP_DIR}signing-assets/PremiumCert/cert.txt"
          fi

          # تحديث الـ IPA بالملفات الجديدة فقط (0.1 ثانية!)
          zip -q0ur raw_app.ipa Payload

          # 5. التوقيع الصامت والمباشر
          ./zsign -q -k cert.p12 -p "$CERT_PASSWORD" -m profile.mobileprovision -o "${APP_NAME}_signed.ipa" raw_app.ipa

          # 6. الرفع الصاروخي من داخل الـ RAM مباشرة
          gh release create "build-${BUILD_ID}" "${APP_NAME}_signed.ipa" "bundle_id.txt" -t "Cloud Build ${BUILD_ID}" -R ${{ github.repository }}
