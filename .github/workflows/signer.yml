name: Premium Cloud Signer Engine

on:
  repository_dispatch:
    types: [trigger-sign]

jobs:
  build_and_sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment (Ultra Fast)
        run: |
          set -euo pipefail
          
          # تنفيذ التثبيت والتحميل في نفس اللحظة لتوفير الوقت
          (sudo apt-get update -yqq && sudo apt-get install -yqq imagemagick) &
          (wget -qO- https://github.com/zhlynn/zsign/releases/download/v1.0.4/zsign-linux-x86_64.tar.gz | tar -xz) &
          wait
          
          ZSIGN_BIN=$(find . -type f -name "zsign" -print -quit)
          chmod +x "$ZSIGN_BIN"
          sudo mv "$ZSIGN_BIN" /usr/local/bin/zsign

      - name: Download Raw IPA & Custom Icon
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
        run: |
          set -euo pipefail
          
          IPA_URL=""
          ICON_URL=""

          if [[ "$APP_NAME" == "ESign" ]]; then 
            IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Esign.ipa"
            ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1419.jpeg"
          elif [[ "$APP_NAME" == "KSign" ]]; then 
            IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Ksign.7.ipa"
            ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1416.jpeg"
          elif [[ "$APP_NAME" == "Feather" ]]; then 
            IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Feather.ipa"
            ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1421.jpeg"
          elif [[ "$APP_NAME" == "Scarlet" ]]; then 
            IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/Scarlet.ipa"
            ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1420.jpeg"
          elif [[ "$APP_NAME" == "GBox" ]]; then 
            IPA_URL="https://github.com/ipa-black/Signer/releases/download/V1/GBox_v5.7.6.ipa"
            ICON_URL="https://raw.githubusercontent.com/ipa-black/Signer/refs/heads/main/icons/IMG_1417.jpeg"
          fi

          if [[ -z "$IPA_URL" ]]; then 
            echo "Error: Unknown APP_NAME: $APP_NAME"
            exit 1
          fi
          
          echo "Downloading $APP_NAME IPA..."
          # إزالة التحميل المتوازي لضمان عدم تخطي الأخطاء
          curl -L --fail -o raw_app.ipa "$IPA_URL"
          
          echo "Downloading Custom Icon..."
          curl -L --fail -o downloaded_icon.jpeg "$ICON_URL"

      - name: Inject Icon, Certificates & Extract Bundle ID
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          USE_FREE_CERT: ${{ github.event.client_payload.use_free_cert }}
          P12_BASE64: ${{ github.event.client_payload.p12_base64 }}
          PROV_BASE64: ${{ github.event.client_payload.prov_base64 }}
          CUSTOM_PASSWORD: ${{ github.event.client_payload.password }}
        run: |
          set -euo pipefail
          
          if [[ "$USE_FREE_CERT" == "true" ]]; then
            echo "Using Built-in Free Certificate..."
            cp cert/cert.p12 cert.p12
            cp cert/profile.mobileprovision profile.mobileprovision
            CERT_PASSWORD=$(cat cert/pass.txt)
          else
            echo "Using Custom VIP Certificate..."
            echo "$P12_BASE64" | base64 -d > cert.p12
            echo "$PROV_BASE64" | base64 -d > profile.mobileprovision
            CERT_PASSWORD="$CUSTOM_PASSWORD"
          fi
          
          echo "CERT_PASSWORD=$CERT_PASSWORD" >> $GITHUB_ENV

          unzip -q raw_app.ipa -d extracted
          APP_DIR=$(find extracted/Payload -maxdepth 1 -name "*.app" -print -quit)

          convert downloaded_icon.jpeg "$APP_DIR/CustomIpaBlackIcon.png"

          python3 -c '
          import plistlib, glob, os
          app_name = os.environ.get("APP_NAME", "unknown")
          app_dirs = glob.glob("extracted/Payload/*.app")
          if app_dirs:
              app_dir = app_dirs[0]
              plist_path = os.path.join(app_dir, "Info.plist")
              try:
                  with open(plist_path, "rb") as f:
                      pl = plistlib.load(f)
                  print(pl.get("CFBundleIdentifier", f"com.ipablack.{app_name}"))
                  pl["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["CustomIpaBlackIcon"], "UIPrerenderedIcon": True}}
                  if "CFBundleIcons~ipad" in pl:
                      pl["CFBundleIcons~ipad"] = pl["CFBundleIcons"]
                  with open(plist_path, "wb") as f:
                          plistlib.dump(pl, f)
              except Exception as e:
                  print(f"com.ipablack.{app_name}")
          else:
              print(f"com.ipablack.{app_name}")
          ' > bundle_id.txt

          if [[ "$APP_NAME" == "Feather" || "$APP_NAME" == "KSign" ]]; then
            ASSETS_DIR="$APP_DIR/signing-assets/PremiumCert"
            mkdir -p "$ASSETS_DIR"
            cp cert.p12 "$ASSETS_DIR/cert.p12"
            cp profile.mobileprovision "$ASSETS_DIR/cert.mobileprovision"
            echo "$CERT_PASSWORD" > "$ASSETS_DIR/cert.txt"
          fi

          cd extracted
          zip -q -1 -r ../ready_to_sign.ipa Payload
          cd ..

      - name: Sign IPA with ZSign
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
        run: |
          set -euo pipefail
          zsign -q -k cert.p12 -p "$CERT_PASSWORD" -m profile.mobileprovision -o "${APP_NAME}_signed.ipa" ready_to_sign.ipa

      - name: Upload to Secure Storage
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.event.client_payload.build_id }}
          name: "Cloud Build ${{ github.event.client_payload.build_id }}"
          files: |
            ${{ github.event.client_payload.app_name }}_signed.ipa
            bundle_id.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
